services:
  ollama:
    image: ollama/ollama:latest
    container_name: script-lab-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_ORIGINS: ${OLLAMA_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # Descarga modelos la primera vez (o cuando cambies OLLAMA_MODELS).
  # Uso: docker compose --profile setup run --rm ollama-models
  ollama-models:
    profiles: ["setup"]
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for model in $$OLLAMA_MODELS; do
          echo "Descargando $$model..."
          OLLAMA_HOST=http://ollama:11434 ollama pull "$$model"
        done
        echo "Modelos listos."
    environment:
      OLLAMA_MODELS: ${OLLAMA_MODELS:-llama3.2 qwen2.5:3b}

  script-lab:
    build: .
    container_name: script-lab-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
